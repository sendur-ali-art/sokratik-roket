<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sokratik Sandbox - 3D Roket Üssü</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: #1e272e; color: white;}
        
        #ui-panel { width: 30%; background: #2f3640; display: flex; flex-direction: column; border-right: 3px solid #e1b12c; z-index: 10; box-shadow: 5px 0 15px rgba(0,0,0,0.5);}
        #header { padding: 15px; background: #e1b12c; color: #2f3640; font-weight: bold; text-align: center; font-size: 18px;}
        
        #chat-history { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #353b48;}
        .msg { padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.4;}
        .ai-msg { background: #dcdde1; color: #2f3640; align-self: flex-start; border-bottom-left-radius: 0;}
        .user-msg { background: #0097e6; color: white; align-self: flex-end; border-bottom-right-radius: 0;}
        
        #chat-input-area { display: flex; padding: 10px; background: #2f3640; }
        input[type="text"] { flex: 1; padding: 10px; border: none; border-radius: 4px; outline: none; }
        button.send-btn { background: #e1b12c; border: none; padding: 10px 15px; margin-left: 5px; cursor: pointer; font-weight: bold; border-radius: 4px;}

        #controls { padding: 15px; background: #2f3640; border-top: 2px solid #718093;}
        .slider-group { margin-bottom: 15px;}
        label { display: block; font-size: 12px; margin-bottom: 5px; color: #dcdde1;}
        input[type="range"] { width: 100%; cursor: pointer;}
        button.launch-btn { width: 100%; padding: 15px; background: #e84118; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s;}
        button.launch-btn:hover { background: #c23616;}

        #sim-container { width: 70%; position: relative;}
        canvas { display: block; width: 100%; height: 100%;}
        
        #hud { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; color: #00a8ff; font-family: monospace; font-size: 14px; pointer-events: none;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-panel">
        <div id="header">🚀 Sokratik Roket Laboratuvarı</div>
        
        <div id="chat-history">
            <div class="msg ai-msg">
                Merhaba! Ben Sokratik öğrenme asistanınım. Amacımız roketi karşıdaki kırmızı hedefe indirmek. Sence 90 derece dik açıyla fırlatırsak hedefe ulaşır mıyız? Fırlatmayı dene ve sonucu gör!
            </div>
        </div>
        
        <div id="chat-input-area">
            <input type="text" id="userInput" placeholder="Yapay zeka ile tartış..." onkeypress="if(event.key === 'Enter') sendChat()">
            <button class="send-btn" onclick="sendChat()">Gönder</button>
        </div>

        <div id="controls">
            <div class="slider-group">
                <label>Fırlatma Açısı (Derece): <span id="angleVal">45</span>°</label>
                <input type="range" id="angleSlider" min="10" max="90" value="45">
            </div>
            <div class="slider-group">
                <label>İtme Kuvveti (Hız): <span id="thrustVal">50</span> m/s</label>
                <input type="range" id="thrustSlider" min="20" max="80" value="50">
            </div>
            <button class="launch-btn" onclick="launchRocket()">ATEŞLE</button>
        </div>
    </div>

    <div id="sim-container">
        <div id="hud">
            DURUM: BEKLİYOR<br>
            Yükseklik: 0 m<br>
            Menzil: 0 m
        </div>
        <canvas id="sim-canvas"></canvas>
    </div>

    <script>
        async function sendChat() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if(!message) return;

            addMsg('user-msg', message);
            input.value = '';

            addMsg('ai-msg', '⏳ Düşünüyor...', 'loading');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                document.getElementById('loading').remove();
                addMsg('ai-msg', data.reply);
            } catch (err) {
                document.getElementById('loading').remove();
                addMsg('ai-msg', 'Bağlantı hatası oluştu.');
            }
        }

        function addMsg(type, text, id="") {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = text;
            if(id) div.id = id;
            document.getElementById('chat-history').appendChild(div);
            div.scrollIntoView();
        }

        document.getElementById('angleSlider').oninput = function() { document.getElementById('angleVal').innerText = this.value; };
        document.getElementById('thrustSlider').oninput = function() { document.getElementById('thrustVal').innerText = this.value; };

        let scene, camera, renderer, controls;
        let rocket, targetPad;
        let isLaunched = false;
        let time = 0;
        let v0, theta, startX, startY, startZ;
        const gravity = 9.8;

        init3D();
        animate();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 

            camera = new THREE.PerspectiveCamera(60, window.innerWidth*0.7 / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 20, 80);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('sim-canvas'), antialias: true });
            renderer.setSize(window.innerWidth * 0.7, window.innerHeight);

            controls = new THREE.OrbitControls(camera, renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            scene.add(dirLight);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshLambertMaterial({color: 0x2ed573}));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            const pad = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, 2, 32), new THREE.MeshLambertMaterial({color: 0x747d8c}));
            pad.position.set(-50, 1, 0);
            scene.add(pad);

            targetPad = new THREE.Mesh(new THREE.CylinderGeometry(8, 8, 2.1, 32), new THREE.MeshLambertMaterial({color: 0xff4757}));
            targetPad.position.set(100, 1, 0); 
            scene.add(targetPad);

            rocket = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 6, 16), new THREE.MeshLambertMaterial({color: 0xf1f2f6}));
            body.position.y = 3;
            const nose = new THREE.Mesh(new THREE.ConeGeometry(1, 3, 16), new THREE.MeshLambertMaterial({color: 0xff4757}));
            nose.position.y = 7.5;
            rocket.add(body);
            rocket.add(nose);
            rocket.position.set(-50, 2, 0);
            scene.add(rocket);

            startX = rocket.position.x;
            startY = rocket.position.y;
            startZ = rocket.position.z;
        }

        function launchRocket() {
            if(isLaunched) return;
            
            const angleDeg = parseFloat(document.getElementById('angleSlider').value);
            v0 = parseFloat(document.getElementById('thrustSlider').value);
            theta = angleDeg * (Math.PI / 180); 
            
            time = 0;
            isLaunched = true;
            document.querySelector('.launch-btn').innerText = "HAVADA...";
            document.querySelector('.launch-btn').style.background = "#f39c12";

            rocket.rotation.z = -((Math.PI/2) - theta);
        }

        function resetRocket(statusMsg) {
            isLaunched = false;
            rocket.position.set(startX, startY, startZ);
            rocket.rotation.set(0, 0, 0);
            document.querySelector('.launch-btn').innerText = "YENİDEN ATEŞLE";
            document.querySelector('.launch-btn').style.background = "#e84118";
            
            addMsg('ai-msg', `💥 <b>${statusMsg}</b> Şimdi buradaki fizik kurallarını konuşalım. Açıyı veya hızı nasıl değiştirmeliyiz?`);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (isLaunched) {
                time += 0.05; 

                let dx = v0 * Math.cos(theta) * time;
                let dy = (v0 * Math.sin(theta) * time) - (0.5 * gravity * time * time);

                rocket.position.x = startX + dx;
                rocket.position.y = startY + dy;

                let vx = v0 * Math.cos(theta);
                let vy = v0 * Math.sin(theta) - (gravity * time);
                let currentAngle = Math.atan2(vy, vx);
                rocket.rotation.z = -( (Math.PI/2) - currentAngle );

                document.getElementById('hud').innerHTML = `
                    DURUM: UÇUYOR 🚀<br>
                    Yükseklik (y): ${rocket.position.y.toFixed(1)} m<br>
                    Menzil (x): ${(rocket.position.x - startX).toFixed(1)} m
                `;

                if (rocket.position.y < 2 && time > 0.5) {
                    let distanceToTarget = Math.abs(rocket.position.x - targetPad.position.x);
                    
                    if (distanceToTarget < 10) {
                        document.getElementById('hud').innerHTML = `DURUM: 🟢 HEDEFE ULAŞTI!`;
                        resetRocket("Tebrikler! Roket tam hedefe iniş yaptı.");
                    } else {
                        document.getElementById('hud').innerHTML = `DURUM: 🔴 ÇAKILDI!`;
                        resetRocket("Eyvah, roket çakıldı! Hedefi ıskaladık.");
                    }
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth*0.7 / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth*0.7, window.innerHeight);
        });
    </script>
</body>
</html>
